[project]
site_name = "PIIGhost API"
site_url = "https://athroniaeth.github.io/piighost-api/fr/"
site_description = "Serveur d'API REST pour l'anonymisation PII piighost."
site_author = "PIIGhost"
copyright = "Copyright &copy; 2026 contributeurs PIIGhost"
repo_url = "https://github.com/Athroniaeth/piighost-api"
repo_name = "Athroniaeth/piighost-api"
edit_uri = "edit/master/docs/fr/"
docs_dir = "docs/fr"
site_dir = "site/fr"

nav = [
  { "Accueil" = "index.md" },
  { "Démarrer" = [
    { "Installation" = "getting-started/installation.md" },
    { "Démarrage rapide" = "getting-started/quickstart.md" },
  ]},
  { "Référence" = [
    { "Endpoints REST" = "reference/endpoints.md" },
    { "CLI" = "reference/cli.md" },
  ]},
]

[project.theme]
language = "fr"
icon.logo = "lucide/ghost"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Passer en mode sombre"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Passer en mode clair"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/fr"]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[[project.extra.alternate]]
name = "English"
link = "/piighost-api/"
lang = "en"

[[project.extra.alternate]]
name = "Français"
link = "/piighost-api/fr/"
lang = "fr"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Athroniaeth/piighost-api"
name = "PIIGhost API sur GitHub"
