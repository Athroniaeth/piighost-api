# Hook config for prek (https://github.com/j178/prek), the Rust drop-in
# for pre-commit. Install with `make hooks`.
repos:
  - repo: local
    hooks:
      - id: piighost-lock-pypi-mode
        name: uv.lock has piighost from PyPI (run `make install`)
        # ``uv lock --locked --no-sources`` resolves the lockfile while
        # ignoring any [tool.uv.sources] override. If a developer ran
        # ``make dev-local`` (which layers an editable piighost over
        # the PyPI sync) and a stray ``uv sync`` mutated the lockfile,
        # the check exits non-zero and the commit is blocked.
        entry: uv lock --locked --no-sources
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
