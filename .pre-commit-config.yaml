# Hook config for prek (https://github.com/j178/prek), the Rust drop-in
# for pre-commit. Install with `make hooks`.
repos:
  - repo: local
    hooks:
      - id: piighost-lock-pypi-mode
        name: auto-flip uv.lock to PyPI mode (re-stages if changed)
        # Auto-fix mode: regenerate the lockfile with --no-sources so any
        # editable file:// piighost source is replaced by the PyPI
        # registry equivalent, then re-stage. The commit always lands a
        # PyPI-mode lockfile regardless of the developer's local state
        # (e.g. after ``make dev-local`` flipped the lock to editable).
        # This used to be a check-only hook that exit 1 and blocked the
        # commit; in that mode prek's stash/restore around the failing
        # hook occasionally lost unstaged modifs in
        # ~/.cache/prek/patches/. Auto-fix avoids the failure path.
        entry: bash -c 'uv lock --no-sources --quiet && git add uv.lock'
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
