services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      - PIIGHOST_CONFIG=${PIIGHOST_CONFIG:-/app/pipeline.toml}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_PEPPER=${SECRET_PEPPER}
      - API_KEY_default=${API_KEY}
      - PIIGHOST_ALLOW_ANONYMOUS=${PIIGHOST_ALLOW_ANONYMOUS:-}
      - PIIGHOST_MAX_BODY_BYTES=${PIIGHOST_MAX_BODY_BYTES:-1000000}
      - PIIGHOST_RATE_LIMIT=${PIIGHOST_RATE_LIMIT:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-}
      - EXTRA_PACKAGES=${EXTRA_PACKAGES:-}
    volumes:
      - ./pipeline.toml:/app/pipeline.toml
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  huggingface-cache:
